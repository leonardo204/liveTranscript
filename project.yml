name: liveTranslate

options:
  bundleIdPrefix: com.altimedia
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

# SPM 의존성 (M1b): FluidAudio = 사전 변환된 CoreML Silero VAD SDK (스펙 §5.6)
packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: 0.12.4

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # 서명: 개인 팀 자동 서명. project.yml에 고정하여 xcodegen 재생성에도 유지됨.
    # (Xcode UI에서 바꾼 설정은 .xcodeproj=생성물이라 다음 generate 때 사라지므로 여기서 관리)
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: XU8HS9JUTS
    CODE_SIGN_IDENTITY: "Apple Development"

targets:
  liveTranslate:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
    dependencies:
      - package: FluidAudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.altimedia.liveTranslate
        PRODUCT_NAME: liveTranslate
        # Info.plist를 INFOPLIST_KEY_* 설정으로부터 자동 생성
        GENERATE_INFOPLIST_FILE: "YES"
        # 메뉴바 전용 앱 — Dock 아이콘 없음
        INFOPLIST_KEY_LSUIElement: "YES"
        # 마이크 권한 사용 문구 (M1 오디오 캡처에서 사용)
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "실시간 번역을 위해 마이크 입력을 사용합니다"
        ENABLE_HARDENED_RUNTIME: "YES"
        SWIFT_STRICT_CONCURRENCY: complete
