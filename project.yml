name: liveTranslate

options:
  bundleIdPrefix: com.altimedia
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

# SPM 의존성
#  - FluidAudio (M1b): 사전 변환된 CoreML Silero VAD SDK (스펙 §5.6)
#  - Sparkle (자동 업데이트): GitHub appcast.xml 피드 기반 in-app 업데이트
packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: 0.12.4
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.7.0

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.5.0"
    CURRENT_PROJECT_VERSION: "5"
    # 서명: 개인 팀 자동 서명. project.yml에 고정하여 xcodegen 재생성에도 유지됨.
    # (Xcode UI에서 바꾼 설정은 .xcodeproj=생성물이라 다음 generate 때 사라지므로 여기서 관리)
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: XU8HS9JUTS
    CODE_SIGN_IDENTITY: "Apple Development"

targets:
  liveTranslate:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources
    dependencies:
      - package: FluidAudio
      - package: Sparkle
    # Info.plist를 XcodeGen이 생성(권한 문구 등 커스텀 키 포함).
    # GENERATE_INFOPLIST_FILE는 일부 표준 키만 매핑하므로, NSAudioCaptureUsageDescription 같은
    # 키는 누락된다 → 명시적 info 파일로 모든 권한 문구를 보장한다.
    info:
      path: Info.plist
      properties:
        # 메뉴바 전용 앱 — Dock 아이콘 없음
        LSUIElement: true
        # 마이크 권한 사용 문구 (M1 오디오 캡처에서 사용)
        NSMicrophoneUsageDescription: "실시간 번역을 위해 마이크 입력을 사용합니다"
        # 시스템 오디오 직접 캡처 권한 문구 (M1c, Core Audio Process Tap, macOS 14.4+ TCC)
        # 첫 tap 생성 시 OS가 이 문구로 캡처 권한을 묻는다(화면 녹화 권한 불필요).
        NSAudioCaptureUsageDescription: "실시간 번역을 위해 시스템에서 재생되는 오디오를 캡처합니다"
        # 음성 인식 권한 문구 (spec 007, Apple Speech 온디바이스 전사 — SFSpeechRecognizer.requestAuthorization).
        # 온디바이스 처리지만 Speech 프레임워크 인증 흐름상 이 키가 필요하다.
        NSSpeechRecognitionUsageDescription: "키 없이 오프라인 번역을 제공하기 위해 음성을 텍스트로 변환합니다(온디바이스 처리)"
        # 버전 표시는 빌드 설정(MARKETING_VERSION/CURRENT_PROJECT_VERSION)을 단일 진실로 사용한다.
        # ($()는 빌드 시 치환됨 — Sparkle/설정 UI의 "현재 버전"이 project.yml 버전과 항상 일치.)
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # ── Sparkle 자동 업데이트 설정 ──────────────────────────────────────
        # 자동 업데이트 확인 활성화(앱 launch 후 주기적 확인).
        SUEnableAutomaticChecks: true
        # appcast 피드: main 브랜치의 appcast.xml을 raw.githubusercontent.com으로 서비스.
        SUFeedURL: "https://raw.githubusercontent.com/leonardo204/liveTranscript/main/appcast.xml"
        # Sparkle EdDSA 공개키 — 다운로드된 업데이트의 서명 검증에 사용.
        # 비밀키는 macOS Keychain에 보관(generate_keys). 릴리스 시 sign_update가 사용.
        SUPublicEDKey: "t/ShxvoO/jkL8lnwySVxbQU7SKtFEgwEkAznczDN1Is="
        # 자동 업데이트 확인 주기(초). 86400 = 24시간.
        SUScheduledCheckInterval: 86400
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.altimedia.liveTranslate
        PRODUCT_NAME: liveTranslate
        ENABLE_HARDENED_RUNTIME: "YES"
        SWIFT_STRICT_CONCURRENCY: complete
        # 앱 아이콘 — Sources/Assets.xcassets/AppIcon.appiconset(에셋 카탈로그는 sources 글롭에 포함됨).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
