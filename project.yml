name: liveTranslate

options:
  bundleIdPrefix: com.altimedia
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

# SPM 의존성 (M1b): FluidAudio = 사전 변환된 CoreML Silero VAD SDK (스펙 §5.6)
packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: 0.12.4

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # 서명: 개인 팀 자동 서명. project.yml에 고정하여 xcodegen 재생성에도 유지됨.
    # (Xcode UI에서 바꾼 설정은 .xcodeproj=생성물이라 다음 generate 때 사라지므로 여기서 관리)
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: XU8HS9JUTS
    CODE_SIGN_IDENTITY: "Apple Development"

targets:
  liveTranslate:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
    dependencies:
      - package: FluidAudio
    # Info.plist를 XcodeGen이 생성(권한 문구 등 커스텀 키 포함).
    # GENERATE_INFOPLIST_FILE는 일부 표준 키만 매핑하므로, NSAudioCaptureUsageDescription 같은
    # 키는 누락된다 → 명시적 info 파일로 모든 권한 문구를 보장한다.
    info:
      path: Info.plist
      properties:
        # 메뉴바 전용 앱 — Dock 아이콘 없음
        LSUIElement: true
        # 마이크 권한 사용 문구 (M1 오디오 캡처에서 사용)
        NSMicrophoneUsageDescription: "실시간 번역을 위해 마이크 입력을 사용합니다"
        # 시스템 오디오 직접 캡처 권한 문구 (M1c, Core Audio Process Tap, macOS 14.4+ TCC)
        # 첫 tap 생성 시 OS가 이 문구로 캡처 권한을 묻는다(화면 녹화 권한 불필요).
        NSAudioCaptureUsageDescription: "실시간 번역을 위해 시스템에서 재생되는 오디오를 캡처합니다"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.altimedia.liveTranslate
        PRODUCT_NAME: liveTranslate
        ENABLE_HARDENED_RUNTIME: "YES"
        SWIFT_STRICT_CONCURRENCY: complete
